name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Env vars required by pydantic-settings at import time.
    env:
      DATABASE_URL: "sqlite:///./test.db"
      OPENAI_API_KEY: "dummy_key_for_ci"
      API_KEY: "test-api-key-for-ci"
      ALLOWED_ORIGINS: "http://localhost:5173"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install backend dependencies
      run: |
        cd backend
        pip install --upgrade pip
        # Install core + test dependencies. Use --no-deps for heavy ML
        # packages that have no Linux wheel to avoid build failures.
        pip install -r requirements.txt --extra-index-url https://pypi.org/simple
        pip install -r requirements-dev.txt

    - name: Run linting
      run: |
        cd backend
        python -m ruff check .

    - name: Run tests with coverage
      run: |
        cd backend
        python -m pytest --cov=api --cov=agents --cov=rag --cov=utils -v

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install frontend dependencies
      run: |
        cd frontend
        npm ci

    - name: Run frontend lint
      run: |
        cd frontend
        npm run lint

    - name: Build frontend
      run: |
        cd frontend
        npm run build
