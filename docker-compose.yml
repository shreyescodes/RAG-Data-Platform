version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      # Critical #1: No hardcoded passwords. All credentials MUST be set in the
      # host environment or a .env file. The app will refuse to start if missing.
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # Low #12: Do NOT publish the DB port externally in production.
    # The backend reaches postgres via the internal Docker network (hostname: db).
    # Uncomment the lines below ONLY for local development debugging:
    # ports:
    #   - "127.0.0.1:5432:5432"   # Bind to loopback only if you must expose it locally
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
